<header class="header">
    <div class="header-left">
        <img class="logo-icon" ngSrc="assets/logoNoBg.png" alt="logo" height="498" width="501">
        <span class="logo-text">
            <a routerLink="/">Blinkergate</a>
        </span>
    </div>
    <div class="header-right">
          <span class="username">
            <button class="btn-ghost" routerLink="/user">{{ username }}</button>
          </span>
        <button class="btn-ghost" (click)="logout()">Logout</button>
    </div>
</header>
